<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Nomo News</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --navy:#1a1a2e; --gold:#FFD700; --ink:#0e0e16; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:var(--ink); color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; overflow:hidden; }
  #status { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; color:#cfcfe0; font-size:15px; }
  .deck { display:flex; height:100vh; height:100dvh; overflow-x:auto; overflow-y:hidden;
    scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .deck::-webkit-scrollbar { display:none; }
  .card { position:relative; min-width:100vw; width:100vw; height:100vh; height:100dvh;
    scroll-snap-align:center; scroll-snap-stop:always; display:flex; flex-direction:column; }
  .photo { height:50vh; height:50dvh; background-size:cover; background-position:center;
    background-color:var(--navy); position:relative; flex-shrink:0; }
  .photo::after { content:""; position:absolute; left:0; right:0; bottom:0; height:90px;
    background:linear-gradient(to top, rgba(14,14,22,1), rgba(14,14,22,0)); }
  .badge { position:absolute; top:34px; left:16px; background:#E12828; color:#fff;
    font-size:11px; font-weight:600; letter-spacing:1px; padding:5px 11px; border-radius:6px; z-index:2; }
  .body { flex:1; padding:16px 22px 28px; display:flex; flex-direction:column; overflow:hidden; }
  .src { color:var(--gold); font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
  .headline { font-size:22px; font-weight:600; line-height:1.22; margin:8px 0 0; }
  .summary { font-size:15px; line-height:1.6; color:#d7d7e0; margin:12px 0 0; overflow-y:auto; }
  .credit { font-size:11.5px; color:#8a8a99; margin:10px 0 0; font-style:italic; }
  .read { margin-top:auto; padding-top:14px; position:relative; z-index:5; }
  .read a { color:var(--gold); font-size:15px; font-weight:600; text-decoration:none;
    border-bottom:2px solid var(--gold); padding-bottom:3px; }
  .bars { position:fixed; top:0; left:0; right:0; display:flex; gap:4px; padding:9px 12px; z-index:6; }
  .bar { flex:1; height:3px; background:rgba(255,255,255,0.28); border-radius:2px; transition:background .2s; }
  .bar.on { background:var(--gold); }
  .chev { position:fixed; top:25vh; top:25dvh; font-size:30px; color:rgba(255,255,255,0.5); z-index:3; pointer-events:none; }
  .chev.l { left:8px; } .chev.r { right:8px; }
  .hint { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:8;
    background:rgba(0,0,0,0.55); transition:opacity .4s; }
  .hint.hide { opacity:0; pointer-events:none; }
  .hint .box { text-align:center; color:#fff; font-size:15px; line-height:1.5; padding:0 32px; }
  .hint .box b { color:var(--gold); }
</style>
</head>
<body>
  <div id="status">Loading the latest stories…</div>
  <div class="deck" id="deck" hidden></div>
  <div class="bars" id="bars" hidden></div>
  <div class="chev l" id="chevL" hidden>‹</div>
  <div class="chev r" id="chevR" hidden>›</div>
  <div class="hint hide" id="hint"><div class="box">Tap the <b>right</b> side for the next story,<br>the <b>left</b> side to go back.</div></div>

<script>
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand();
    tg.setHeaderColor && tg.setHeaderColor('#1a1a2e');
    tg.setBackgroundColor && tg.setBackgroundColor('#0e0e16'); }

  var deck = document.getElementById('deck');
  var barsEl = document.getElementById('bars');
  var total = 0, index = 0;

  function esc(s) { return String(s || '').replace(/[&<>"]/g, function (c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]; }); }
  function openLink(url) { if (tg && tg.openLink) tg.openLink(url); else window.open(url, '_blank'); }
  function haptic() { if (tg && tg.HapticFeedback) tg.HapticFeedback.selectionChanged(); }

  function updateBars() {
    var kids = barsEl.children;
    for (var i = 0; i < kids.length; i++) kids[i].className = 'bar' + (i <= index ? ' on' : '');
    document.getElementById('chevL').style.visibility = index === 0 ? 'hidden' : 'visible';
    document.getElementById('chevR').style.visibility = index === total - 1 ? 'hidden' : 'visible';
  }
  function go(delta) {
    var target = Math.min(Math.max(index + delta, 0), total - 1);
    if (target === index) return;
    index = target;
    deck.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' });
    updateBars();
    haptic();
  }

  function render(stories, credit) {
    total = stories.length;
    deck.innerHTML = stories.map(function (s, i) {
      var photo = s.image ? 'style="background-image:url(\'' + esc(s.image) + '\')"' : '';
      var badge = i === 0 ? 'TOP STORY' : 'BRIEFING';
      var creditEl = (s.ai && credit) ? '<div class="credit">🤖 ' + esc(credit) + '</div>' : '';
      var read = s.url
        ? '<div class="read"><a href="#" onclick="openLink(\'' + esc(s.url) + '\');return false;">Read the full story ›</a></div>'
        : '';
      return '<section class="card">'
        + '<div class="photo" ' + photo + '><span class="badge">' + badge + '</span></div>'
        + '<div class="body">'
        + '<div class="src">' + esc(s.source) + '</div>'
        + '<h1 class="headline">' + esc(s.title) + '</h1>'
        + '<p class="summary">' + esc(s.summary) + '</p>'
        + creditEl
        + read
        + '</div></section>';
    }).join('');

    barsEl.innerHTML = stories.map(function () { return '<span class="bar"></span>'; }).join('');

    document.getElementById('status').hidden = true;
    deck.hidden = false;
    barsEl.hidden = false;
    document.getElementById('chevL').hidden = false;
    document.getElementById('chevR').hidden = false;
    updateBars();

    // Instagram-style tap: left third = back, rest = forward. Ignore taps on links.
    deck.addEventListener('click', function (e) {
      if (e.target.closest('a')) return;
      if (e.clientX < window.innerWidth * 0.32) go(-1); else go(1);
    });

    // Keep state in sync if the user swipes instead of tapping.
    var t;
    deck.addEventListener('scroll', function () {
      clearTimeout(t);
      t = setTimeout(function () {
        var i = Math.round(deck.scrollLeft / window.innerWidth);
        if (i !== index) { index = i; updateBars(); haptic(); }
      }, 80);
    }, { passive: true });

    // One-time tap hint.
    if (total > 1) {
      var hint = document.getElementById('hint');
      hint.classList.remove('hide');
      var dismiss = function () { hint.classList.add('hide'); };
      setTimeout(dismiss, 3200);
      hint.addEventListener('click', dismiss);
    }
  }

  fetch('/api/stories')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.stories && d.stories.length) render(d.stories, d.credit);
      else document.getElementById('status').textContent = 'No news available right now. Try again later.';
    })
    .catch(function () {
      document.getElementById('status').textContent = 'Could not load stories. Please try again.';
    });
</script>
</body>
</html>
